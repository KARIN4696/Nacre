name: Train Japanese KenLM 5-gram

on:
  workflow_dispatch:
    inputs:
      max_vocab:
        description: 'Maximum vocabulary size'
        required: false
        default: '300000'
      prune:
        description: 'Pruning thresholds (space-separated, per n-gram order)'
        required: false
        default: '0 0 1 1 1'

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Free disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          echo "=== Disk space after cleanup ==="
          df -h /

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libboost-all-dev \
            zlib1g-dev libbz2-dev liblzma-dev \
            mecab libmecab-dev mecab-ipadic-utf8 \
            python3-pip \
            wget pigz
          echo "=== MeCab version ==="
          mecab --version
          echo "=== MeCab dictionary path ==="
          mecab-config --dicdir

      - name: Download Japanese Wikipedia dump
        timeout-minutes: 60
        run: |
          echo "=== Starting download: $(date) ==="
          wget --progress=dot:giga \
            https://dumps.wikimedia.org/jawiki/latest/jawiki-latest-pages-articles.xml.bz2
          ls -lh jawiki-latest-pages-articles.xml.bz2
          echo "=== Download complete: $(date) ==="

      - name: Extract plain text from Wikipedia dump
        timeout-minutes: 120
        run: |
          echo "=== Starting extraction: $(date) ==="
          # Direct XML parsing — no wikiextractor dependency (avoids Python 3.12 regex bug)
          python3 << 'PYEOF'
          import bz2
          import re
          import xml.etree.ElementTree as ET

          # Patterns to strip MediaWiki markup
          RE_BRACKETS = re.compile(r'\[\[(?:[^|\]]*\|)?([^\]]*)\]\]')
          RE_TEMPLATES = re.compile(r'\{\{[^}]*\}\}')
          RE_HTML = re.compile(r'<[^>]+>')
          RE_REF = re.compile(r'<ref[^>]*>.*?</ref>', re.DOTALL)
          RE_REF2 = re.compile(r'<ref[^>]*/>')
          RE_HEADING = re.compile(r'={2,}[^=]+={2,}')
          RE_BULLET = re.compile(r'^\*+\s*')
          RE_MULTI_SPACE = re.compile(r'\s+')

          def clean_wikitext(text):
              text = RE_REF.sub('', text)
              text = RE_REF2.sub('', text)
              text = RE_TEMPLATES.sub('', text)
              text = RE_BRACKETS.sub(r'\1', text)
              text = RE_HTML.sub('', text)
              text = RE_HEADING.sub('', text)
              return text

          count = 0
          ns = None  # Auto-detect namespace from first element

          with bz2.open('jawiki-latest-pages-articles.xml.bz2', 'rt', encoding='utf-8') as f, \
               open('raw_text.txt', 'w', encoding='utf-8') as out:
              # Iterative parsing to save memory
              for event, elem in ET.iterparse(f, events=('end',)):
                  # Auto-detect MediaWiki XML namespace from first tag
                  if ns is None and '}' in elem.tag:
                      ns = elem.tag.split('}')[0] + '}'
                      print(f'Detected namespace: {ns}')
                  tag = elem.tag.split('}')[-1] if '}' in elem.tag else elem.tag
                  if tag == 'page':
                      # Skip non-article namespaces
                      pfx = ns or ''
                      ns_elem = elem.find(f'{pfx}ns')
                      if ns_elem is not None and ns_elem.text != '0':
                          elem.clear()
                          continue

                      rev = elem.find(f'{pfx}revision')
                      if rev is not None:
                          text_elem = rev.find(f'{pfx}text')
                          if text_elem is not None and text_elem.text:
                              text = text_elem.text
                              # Skip redirects and disambig
                              if text.startswith('#REDIRECT') or text.startswith('#転送'):
                                  elem.clear()
                                  continue

                              text = clean_wikitext(text)
                              for line in text.split('\n'):
                                  line = line.strip()
                                  line = RE_BULLET.sub('', line)
                                  line = RE_MULTI_SPACE.sub(' ', line).strip()
                                  if len(line) > 20 and not line.startswith(('|', '!', '{', '}')):
                                      out.write(line + '\n')
                                      count += 1

                      elem.clear()

                      if count % 500000 == 0 and count > 0:
                          print(f'  Extracted {count} lines...')

          print(f'Done. Total lines: {count}')
          PYEOF

          echo "=== Raw text stats ==="
          wc -l raw_text.txt
          ls -lh raw_text.txt
          head -3 raw_text.txt
          echo "=== Extraction complete: $(date) ==="

          # Free space
          rm -f jawiki-latest-pages-articles.xml.bz2
          df -h /

      - name: Tokenize with MeCab
        timeout-minutes: 60
        run: |
          echo "=== Starting MeCab tokenization: $(date) ==="
          # Tokenize: output space-separated words, one sentence per line
          cat raw_text.txt | mecab -Owakati -b 262144 > tokenized.txt 2>mecab_errors.txt || true
          echo "=== MeCab errors (if any) ==="
          head -20 mecab_errors.txt || true
          echo "=== Tokenized text stats ==="
          wc -l tokenized.txt
          ls -lh tokenized.txt
          head -3 tokenized.txt
          echo "=== Tokenization complete: $(date) ==="

          # Free space
          rm -f raw_text.txt
          df -h /

      - name: Limit vocabulary (top ${{ github.event.inputs.max_vocab || '300000' }} words)
        timeout-minutes: 20
        run: |
          MAX_VOCAB=${{ github.event.inputs.max_vocab || '300000' }}
          echo "=== Building vocabulary (top ${MAX_VOCAB} words): $(date) ==="

          # Count word frequencies and build vocab list
          cat tokenized.txt \
            | tr ' ' '\n' \
            | sort -S 2G --parallel=4 \
            | uniq -c \
            | sort -rn -S 2G --parallel=4 \
            | head -n "${MAX_VOCAB}" \
            | awk '{print $2}' \
            > vocab.txt

          echo "=== Vocabulary size ==="
          wc -l vocab.txt
          echo "=== Top 20 words ==="
          head -20 vocab.txt

          # Filter tokenized text to only include vocab words
          python3 -c "
          import sys

          vocab = set()
          with open('vocab.txt', 'r') as f:
              for line in f:
                  vocab.add(line.strip())

          print(f'Loaded {len(vocab)} vocab words', file=sys.stderr)

          count = 0
          with open('tokenized.txt', 'r') as fin, open('tokenized_filtered.txt', 'w') as fout:
              for line in fin:
                  words = line.strip().split()
                  filtered = [w if w in vocab else '<unk>' for w in words]
                  if filtered:
                      fout.write(' '.join(filtered) + '\n')
                  count += 1
                  if count % 1000000 == 0:
                      print(f'  Processed {count} lines...', file=sys.stderr)

          print(f'Done. Processed {count} lines total.', file=sys.stderr)
          "

          echo "=== Filtered text stats ==="
          wc -l tokenized_filtered.txt
          ls -lh tokenized_filtered.txt
          echo "=== Vocab filtering complete: $(date) ==="

          # Replace original with filtered
          mv tokenized_filtered.txt tokenized.txt
          rm -f vocab.txt
          df -h /

      - name: Build KenLM from source
        timeout-minutes: 20
        run: |
          echo "=== Cloning KenLM: $(date) ==="
          git clone --depth 1 https://github.com/kpu/kenlm.git
          cd kenlm
          mkdir -p build
          cd build
          echo "=== Configuring: $(date) ==="
          cmake .. -DCMAKE_BUILD_TYPE=Release
          echo "=== Building: $(date) ==="
          make -j$(nproc)
          echo "=== Build complete: $(date) ==="
          ls -la bin/
          echo "=== KenLM binaries ready ==="

      - name: Train 5-gram language model
        timeout-minutes: 90
        run: |
          PRUNE="${{ github.event.inputs.prune || '0 0 1 1 1' }}"
          echo "=== Training 5-gram model with pruning [${PRUNE}]: $(date) ==="
          echo "=== Input file size ==="
          ls -lh tokenized.txt
          wc -l tokenized.txt

          ./kenlm/build/bin/lmplz \
            -o 5 \
            --prune ${PRUNE} \
            --verbose_header \
            --discount_fallback \
            -S 80% \
            -T /tmp \
            < tokenized.txt \
            > japanese-5gram.arpa

          echo "=== ARPA model stats ==="
          ls -lh japanese-5gram.arpa
          head -20 japanese-5gram.arpa
          echo "=== Training complete: $(date) ==="

          # Free space
          rm -f tokenized.txt
          df -h /

      - name: Convert to binary format
        timeout-minutes: 15
        run: |
          echo "=== Converting to binary: $(date) ==="
          ./kenlm/build/bin/build_binary \
            trie \
            japanese-5gram.arpa \
            japanese-5gram.klm

          echo "=== Binary model stats ==="
          ls -lh japanese-5gram.klm
          echo "=== Conversion complete: $(date) ==="

          # Check size
          SIZE_MB=$(du -m japanese-5gram.klm | cut -f1)
          echo "Model size: ${SIZE_MB} MB"
          if [ "$SIZE_MB" -gt 150 ]; then
            echo "::warning::Model size (${SIZE_MB} MB) exceeds 150 MB target. Consider increasing pruning thresholds."
          fi

          # Cleanup
          rm -f japanese-5gram.arpa
          rm -rf kenlm
          df -h /

      - name: Upload KenLM artifact
        uses: actions/upload-artifact@v4
        with:
          name: japanese-5gram-kenlm
          path: japanese-5gram.klm
          retention-days: 90
          compression-level: 6

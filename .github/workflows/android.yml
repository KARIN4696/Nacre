name: Android CI

on:
  workflow_dispatch: # 手動ビルド用

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 🔥【追加】エラーの原因になっているTermux用のaapt2設定を強制消去する
    - name: Fix Termux AAPT2 Override Error
      run: |
        find . -name "*.gradle" -o -name "*.gradle.kts" | xargs sed -i '/aapt2FromMavenOverride/d'
        find . -name "*.properties" | xargs sed -i '/aapt2FromMavenOverride/d'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: nacre-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

name: Train Compact KenLM 3-gram (APK-bundleable)

on:
  workflow_dispatch:
    inputs:
      max_vocab:
        description: 'Maximum vocabulary size'
        required: false
        default: '200000'
      order:
        description: 'N-gram order (3 = compact, 5 = full)'
        required: false
        default: '3'
      prune:
        description: 'Pruning thresholds (space-separated, per n-gram order)'
        required: false
        default: '0 2 5'
      quantize_bits:
        description: 'Quantization bits for trie (8 = smallest, 0 = no quantization)'
        required: false
        default: '8'

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          df -h /

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libboost-all-dev \
            zlib1g-dev libbz2-dev liblzma-dev \
            mecab libmecab-dev mecab-ipadic-utf8 \
            python3-pip \
            wget pigz

      - name: Download Japanese Wikipedia dump
        timeout-minutes: 60
        run: |
          wget --progress=dot:giga \
            https://dumps.wikimedia.org/jawiki/latest/jawiki-latest-pages-articles.xml.bz2
          ls -lh jawiki-latest-pages-articles.xml.bz2

      - name: Extract plain text from Wikipedia dump
        timeout-minutes: 120
        run: |
          python3 << 'PYEOF'
          import bz2
          import re
          import xml.etree.ElementTree as ET

          RE_BRACKETS = re.compile(r'\[\[(?:[^|\]]*\|)?([^\]]*)\]\]')
          RE_TEMPLATES = re.compile(r'\{\{[^}]*\}\}')
          RE_HTML = re.compile(r'<[^>]+>')
          RE_REF = re.compile(r'<ref[^>]*>.*?</ref>', re.DOTALL)
          RE_REF2 = re.compile(r'<ref[^>]*/>')
          RE_HEADING = re.compile(r'={2,}[^=]+={2,}')
          RE_BULLET = re.compile(r'^\*+\s*')
          RE_MULTI_SPACE = re.compile(r'\s+')

          def clean_wikitext(text):
              text = RE_REF.sub('', text)
              text = RE_REF2.sub('', text)
              text = RE_TEMPLATES.sub('', text)
              text = RE_BRACKETS.sub(r'\1', text)
              text = RE_HTML.sub('', text)
              text = RE_HEADING.sub('', text)
              return text

          count = 0
          ns = None

          with bz2.open('jawiki-latest-pages-articles.xml.bz2', 'rt', encoding='utf-8') as f, \
               open('raw_text.txt', 'w', encoding='utf-8') as out:
              for event, elem in ET.iterparse(f, events=('end',)):
                  if ns is None and '}' in elem.tag:
                      ns = elem.tag.split('}')[0] + '}'
                  tag = elem.tag.split('}')[-1] if '}' in elem.tag else elem.tag
                  if tag == 'page':
                      pfx = ns or ''
                      ns_elem = elem.find(f'{pfx}ns')
                      if ns_elem is not None and ns_elem.text != '0':
                          elem.clear()
                          continue
                      rev = elem.find(f'{pfx}revision')
                      if rev is not None:
                          text_elem = rev.find(f'{pfx}text')
                          if text_elem is not None and text_elem.text:
                              text = text_elem.text
                              if text.startswith('#REDIRECT') or text.startswith('#転送'):
                                  elem.clear()
                                  continue
                              text = clean_wikitext(text)
                              for line in text.split('\n'):
                                  line = line.strip()
                                  line = RE_BULLET.sub('', line)
                                  line = RE_MULTI_SPACE.sub(' ', line).strip()
                                  if len(line) > 20 and not line.startswith(('|', '!', '{', '}')):
                                      out.write(line + '\n')
                                      count += 1
                      elem.clear()
                      if count % 500000 == 0 and count > 0:
                          print(f'  Extracted {count} lines...')
          print(f'Done. Total lines: {count}')
          PYEOF
          wc -l raw_text.txt
          rm -f jawiki-latest-pages-articles.xml.bz2
          df -h /

      - name: Tokenize with MeCab
        timeout-minutes: 60
        run: |
          cat raw_text.txt | mecab -Owakati -b 262144 > tokenized.txt 2>/dev/null || true
          wc -l tokenized.txt
          rm -f raw_text.txt
          df -h /

      - name: Limit vocabulary
        timeout-minutes: 20
        run: |
          MAX_VOCAB=${{ github.event.inputs.max_vocab || '200000' }}
          cat tokenized.txt \
            | tr ' ' '\n' \
            | sort -S 2G --parallel=4 \
            | uniq -c \
            | sort -rn -S 2G --parallel=4 \
            | head -n "${MAX_VOCAB}" \
            | awk '{print $2}' \
            > vocab.txt

          wc -l vocab.txt

          python3 -c "
          vocab = set(open('vocab.txt').read().split())
          print(f'Loaded {len(vocab)} vocab words')
          with open('tokenized.txt') as fin, open('filtered.txt', 'w') as fout:
              for line in fin:
                  words = line.strip().split()
                  filtered = [w if w in vocab else '<unk>' for w in words]
                  if filtered:
                      fout.write(' '.join(filtered) + '\n')
          "
          mv filtered.txt tokenized.txt
          rm -f vocab.txt
          df -h /

      - name: Build KenLM from source
        timeout-minutes: 20
        run: |
          git clone --depth 1 https://github.com/kpu/kenlm.git
          cd kenlm && mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Train n-gram language model
        timeout-minutes: 90
        run: |
          ORDER=${{ github.event.inputs.order || '3' }}
          PRUNE="${{ github.event.inputs.prune || '0 2 5' }}"
          echo "Training ${ORDER}-gram model with pruning [${PRUNE}]"
          ls -lh tokenized.txt

          ./kenlm/build/bin/lmplz \
            -o ${ORDER} \
            --prune ${PRUNE} \
            --verbose_header \
            --discount_fallback \
            --skip_symbols \
            -S 80% \
            -T /tmp \
            < tokenized.txt \
            > japanese-compact.arpa

          ls -lh japanese-compact.arpa
          head -15 japanese-compact.arpa
          rm -f tokenized.txt
          df -h /

      - name: Convert to quantized binary
        timeout-minutes: 15
        run: |
          QBITS=${{ github.event.inputs.quantize_bits || '8' }}
          echo "Converting to trie binary with ${QBITS}-bit quantization"

          if [ "$QBITS" -gt 0 ]; then
            ./kenlm/build/bin/build_binary \
              -q ${QBITS} -b ${QBITS} \
              trie \
              japanese-compact.arpa \
              japanese-compact.klm
          else
            ./kenlm/build/bin/build_binary \
              trie \
              japanese-compact.arpa \
              japanese-compact.klm
          fi

          ls -lh japanese-compact.klm
          SIZE_MB=$(du -m japanese-compact.klm | cut -f1)
          echo "Model size: ${SIZE_MB} MB"

          if [ "$SIZE_MB" -gt 50 ]; then
            echo "::warning::Model size (${SIZE_MB} MB) exceeds 50 MB APK target. Increase pruning or reduce vocab."
          fi

          rm -f japanese-compact.arpa
          rm -rf kenlm
          df -h /

      - name: Upload compact KenLM artifact
        uses: actions/upload-artifact@v4
        with:
          name: japanese-compact-kenlm
          path: japanese-compact.klm
          retention-days: 90
          compression-level: 6

      - name: Upload to GitHub Release (if exists)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Upload to existing models release if it exists
          gh release upload v0.1.0-models japanese-compact.klm --clobber || \
            echo "No v0.1.0-models release found, skipping upload"

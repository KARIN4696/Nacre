name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager --install "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Clone KenLM source for native build
        run: |
          git clone --depth 1 https://github.com/kpu/kenlm.git /tmp/kenlm-src
          mkdir -p ime-ai/src/main/cpp/kenlm
          cp -r /tmp/kenlm-src/lm ime-ai/src/main/cpp/kenlm/
          cp -r /tmp/kenlm-src/util ime-ai/src/main/cpp/kenlm/

      - name: Clone llama.cpp source for native build
        run: |
          # Pin to b3500 (mid-July 2024) — matches the pre-sampler-chain API in
          # nacre_llama_jni.cpp (llama_load_model_from_file / llama_batch_add /
          # llama_sample_token_greedy). At this tag sources live under src/,
          # ggml/ and include/; CMakeLists expects a flat llama/ dir, so we
          # find-and-flatten below.
          git clone --depth 1 --branch b3500 https://github.com/ggerganov/llama.cpp.git /tmp/llama-src
          echo "--- source tree ---"
          ls /tmp/llama-src
          [ -d /tmp/llama-src/src ] && echo "src/:" && ls /tmp/llama-src/src
          [ -d /tmp/llama-src/ggml ] && echo "ggml/:" && ls /tmp/llama-src/ggml

          mkdir -p ime-ai/src/main/cpp/llama/common
          DEST=ime-ai/src/main/cpp/llama

          # Flatten llama.cpp core sources (src/ or root) into DEST
          for name in llama.cpp llama-grammar.cpp llama-sampling.cpp llama-vocab.cpp \
                      unicode.cpp unicode-data.cpp; do
            f=$(find /tmp/llama-src -maxdepth 3 -name "$name" -type f | head -n1)
            if [ -n "$f" ]; then cp "$f" "$DEST/"; else echo "::warning::$name not found"; fi
          done

          # ggml sources (src/ or ggml/src or root)
          for name in ggml.c ggml-alloc.c ggml-backend.c ggml-quants.c; do
            f=$(find /tmp/llama-src -maxdepth 4 -name "$name" -type f | head -n1)
            if [ -n "$f" ]; then cp "$f" "$DEST/"; else echo "::warning::$name not found"; fi
          done

          # Headers — public ones live in include/ at b3500
          find /tmp/llama-src/include -maxdepth 2 -name "*.h" -exec cp {} "$DEST/" \; 2>/dev/null || true
          find /tmp/llama-src/src -maxdepth 2 -name "*.h" -exec cp {} "$DEST/" \; 2>/dev/null || true
          find /tmp/llama-src/ggml/include -maxdepth 2 -name "*.h" -exec cp {} "$DEST/" \; 2>/dev/null || true
          find /tmp/llama-src/ggml/src -maxdepth 2 -name "*.h" -exec cp {} "$DEST/" \; 2>/dev/null || true
          find /tmp/llama-src -maxdepth 1 -name "*.h" -exec cp {} "$DEST/" \; 2>/dev/null || true

          # common/
          for name in common.cpp sampling.cpp; do
            f=$(find /tmp/llama-src -maxdepth 3 -path "*/common/$name" -type f | head -n1)
            if [ -n "$f" ]; then cp "$f" "$DEST/common/"; else echo "::warning::common/$name not found"; fi
          done
          find /tmp/llama-src -maxdepth 3 -path "*/common/*.h" -type f -exec cp {} "$DEST/common/" \; 2>/dev/null || true

          echo "--- llama/ contents ---"
          ls "$DEST/"
          echo "--- llama/common/ contents ---"
          ls "$DEST/common/"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Remove Termux aapt2 override
        run: sed -i '/android.aapt2FromMavenOverride/d' gradle.properties

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug
        env:
          ENABLE_NDK: "true"

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease
        env:
          ENABLE_NDK: "true"

      - name: Verify native library included
        run: |
          echo "=== Checking for libnacre-ai.so ==="
          find app/build/outputs -name "*.apk" -exec unzip -l {} \; | grep libnacre || echo "WARNING: libnacre-ai.so not found in APK"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nacre-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: nacre-release
          path: app/build/outputs/apk/release/*.apk

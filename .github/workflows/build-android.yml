name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager --install "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Clone KenLM source for native build
        run: |
          git clone --depth 1 https://github.com/kpu/kenlm.git /tmp/kenlm-src
          mkdir -p ime-ai/src/main/cpp/kenlm
          cp -r /tmp/kenlm-src/lm ime-ai/src/main/cpp/kenlm/
          cp -r /tmp/kenlm-src/util ime-ai/src/main/cpp/kenlm/

      - name: Clone llama.cpp source for native build
        run: |
          # Pin to b3500 (mid-July 2024). Matches the flat source layout and
          # pre-sampler-chain API that nacre_llama_jni.cpp targets
          # (llama_load_model_from_file / llama_batch_add / llama_sample_token_greedy).
          git clone --depth 1 --branch b3500 https://github.com/ggerganov/llama.cpp.git /tmp/llama-src
          mkdir -p ime-ai/src/main/cpp/llama/common
          # Copy the source files the CMakeLists expects. Older llama.cpp keeps
          # all core .cpp/.c/.h at the repo root with common/ as a subdir.
          cp /tmp/llama-src/llama.cpp ime-ai/src/main/cpp/llama/
          cp /tmp/llama-src/llama-grammar.cpp ime-ai/src/main/cpp/llama/
          cp /tmp/llama-src/llama-sampling.cpp ime-ai/src/main/cpp/llama/
          cp /tmp/llama-src/llama-vocab.cpp ime-ai/src/main/cpp/llama/
          cp /tmp/llama-src/llama.h ime-ai/src/main/cpp/llama/
          cp /tmp/llama-src/llama-impl.h ime-ai/src/main/cpp/llama/ 2>/dev/null || true
          cp /tmp/llama-src/llama-grammar.h ime-ai/src/main/cpp/llama/ 2>/dev/null || true
          cp /tmp/llama-src/llama-sampling.h ime-ai/src/main/cpp/llama/ 2>/dev/null || true
          cp /tmp/llama-src/llama-vocab.h ime-ai/src/main/cpp/llama/ 2>/dev/null || true
          cp /tmp/llama-src/unicode.cpp ime-ai/src/main/cpp/llama/ 2>/dev/null || true
          cp /tmp/llama-src/unicode.h ime-ai/src/main/cpp/llama/ 2>/dev/null || true
          cp /tmp/llama-src/unicode-data.cpp ime-ai/src/main/cpp/llama/ 2>/dev/null || true
          cp /tmp/llama-src/unicode-data.h ime-ai/src/main/cpp/llama/ 2>/dev/null || true
          cp /tmp/llama-src/ggml.c ime-ai/src/main/cpp/llama/
          cp /tmp/llama-src/ggml-alloc.c ime-ai/src/main/cpp/llama/
          cp /tmp/llama-src/ggml-backend.c ime-ai/src/main/cpp/llama/
          cp /tmp/llama-src/ggml-quants.c ime-ai/src/main/cpp/llama/
          cp /tmp/llama-src/ggml*.h ime-ai/src/main/cpp/llama/ 2>/dev/null || true
          cp /tmp/llama-src/common/common.cpp ime-ai/src/main/cpp/llama/common/
          cp /tmp/llama-src/common/sampling.cpp ime-ai/src/main/cpp/llama/common/
          cp /tmp/llama-src/common/*.h ime-ai/src/main/cpp/llama/common/ 2>/dev/null || true
          echo "--- llama/ contents ---"
          ls ime-ai/src/main/cpp/llama/
          echo "--- llama/common/ contents ---"
          ls ime-ai/src/main/cpp/llama/common/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Remove Termux aapt2 override
        run: sed -i '/android.aapt2FromMavenOverride/d' gradle.properties

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug
        env:
          ENABLE_NDK: "true"

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease
        env:
          ENABLE_NDK: "true"

      - name: Verify native library included
        run: |
          echo "=== Checking for libnacre-ai.so ==="
          find app/build/outputs -name "*.apk" -exec unzip -l {} \; | grep libnacre || echo "WARNING: libnacre-ai.so not found in APK"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nacre-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: nacre-release
          path: app/build/outputs/apk/release/*.apk

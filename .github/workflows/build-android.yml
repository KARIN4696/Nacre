name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager --install "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Clone KenLM source for native build
        run: |
          git clone --depth 1 https://github.com/kpu/kenlm.git /tmp/kenlm-src
          mkdir -p ime-ai/src/main/cpp/kenlm
          cp -r /tmp/kenlm-src/lm ime-ai/src/main/cpp/kenlm/
          cp -r /tmp/kenlm-src/util ime-ai/src/main/cpp/kenlm/

      - name: Clone whisper.cpp source
        run: |
          git clone --depth 1 --branch v1.7.3 https://github.com/ggerganov/whisper.cpp /tmp/whisper-src
          DEST=ime-ai/src/main/cpp/whisper
          mkdir -p $DEST
          # Whisper core
          cp /tmp/whisper-src/src/whisper.cpp $DEST/
          cp /tmp/whisper-src/include/whisper.h $DEST/
          # GGML — preserve directory structure
          cp -r /tmp/whisper-src/ggml/src/ $DEST/ggml-src/
          cp -r /tmp/whisper-src/ggml/include/ $DEST/ggml-include/
          # Remove GPU backends we don't need
          rm -rf $DEST/ggml-src/ggml-cuda* $DEST/ggml-src/ggml-metal* $DEST/ggml-src/ggml-vulkan* $DEST/ggml-src/ggml-sycl* $DEST/ggml-src/ggml-kompute* $DEST/ggml-src/ggml-rpc* $DEST/ggml-src/ggml-cann* $DEST/ggml-src/ggml-blas*

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Remove Termux aapt2 override
        run: sed -i '/android.aapt2FromMavenOverride/d' gradle.properties

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug
        env:
          ENABLE_NDK: "true"

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease
        env:
          ENABLE_NDK: "true"

      - name: Verify native library included
        run: |
          echo "=== Checking for libnacre-ai.so ==="
          find app/build/outputs -name "*.apk" -exec unzip -l {} \; | grep libnacre || echo "WARNING: libnacre-ai.so not found in APK"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nacre-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: nacre-release
          path: app/build/outputs/apk/release/*.apk
